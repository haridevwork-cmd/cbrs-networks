<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <!--
    CBRS NeutralHost Services LLC – Logo
    Compact horizontal layout (640×120 viewBox).
    Designed with dark colours so CSS filter:brightness(0)invert(1)
    renders a clean white logo on dark navbar/footer,
    while filter:none shows the original branded colours on white backgrounds.
    Icon centre: (55, 60)  |  Arc opening: ±25° on right side
  -->

  <!-- ── Outer arc r=46 (deep navy) ── -->
  <path d="M 96.69,79.44 A 46,46 0 1,1 96.69,40.56"
        fill="none" stroke="#0d3b8c" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ── Mid arc r=34 (medium blue) ── -->
  <path d="M 85.81,74.37 A 34,34 0 1,1 85.81,45.63"
        fill="none" stroke="#1d5cb8" stroke-width="3.8" stroke-linecap="round"/>

  <!-- ── Inner arc r=23 (bright blue) ── -->
  <path d="M 75.84,69.72 A 23,23 0 1,1 75.84,50.28"
        fill="none" stroke="#2e84d8" stroke-width="3.2" stroke-linecap="round"/>

  <!-- ── Teal C-accent: right-half semicircle r=14 ── -->
  <path d="M 55,46 A 14,14 0 0,1 55,74"
        fill="none" stroke="#14a8c0" stroke-width="6.5" stroke-linecap="round"/>

  <!-- ── Antenna head dot ── -->
  <circle cx="55" cy="46" r="4" fill="#14a8c0"/>

  <!-- ── Antenna A-frame ── -->
  <line x1="55" y1="50" x2="40" y2="78"
        stroke="#0d3b8c" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="55" y1="50" x2="70" y2="78"
        stroke="#0d3b8c" stroke-width="3.2" stroke-linecap="round"/>

  <!-- ── Crossbar ── -->
  <line x1="44" y1="66" x2="66" y2="66"
        stroke="#0d3b8c" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ══════════ TEXT ══════════ -->

  <!-- CBRS – large bold -->
  <text x="115" y="76"
        font-family="'Arial Black','Franklin Gothic Heavy',Impact,Arial,sans-serif"
        font-size="62" font-weight="900"
        fill="#0d2952">CBRS</text>

  <!-- NeutralHost Services LLC -->
  <text x="122" y="95"
        font-family="Arial,Helvetica,sans-serif"
        font-size="24" font-weight="700"
        fill="#1a4db8">NeutralHost Services LLC</text>

  <!-- Tagline -->
  <text x="124" y="112"
        font-family="Arial,Helvetica,sans-serif"
        font-size="13.5" font-weight="500"
        fill="#4a6d90" letter-spacing="3.8">CONNECTING INNOVATION</text>
</svg>
